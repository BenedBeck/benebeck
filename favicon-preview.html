<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>favicon preview</title>
<style>
  body { background: #888; display: flex; gap: 24px; align-items: center; padding: 40px; font-family: sans-serif; }
  figure { margin: 0; text-align: center; color: white; font-size: 12px; }
  img { display: block; background: #555; }
</style>
</head>
<body>
  <figure><img src="favicon.svg" width="16" height="16"><figcaption>16px</figcaption></figure>
  <figure><img src="favicon.svg" width="32" height="32"><figcaption>32px</figcaption></figure>
  <figure><img src="favicon.svg" width="64" height="64"><figcaption>64px</figcaption></figure>
  <figure><img src="favicon.svg" width="128" height="128"><figcaption>128px</figcaption></figure>
</body>
</html>
